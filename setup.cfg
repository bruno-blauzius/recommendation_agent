[flake8]
max-line-length = 120
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    build,
    dist

[tool:pytest]
testpaths = tests
asyncio_mode = auto
addopts =
    --cov=infraestructure
    --cov=agent_core
    --cov=schemas
    --cov=services
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=90
filterwarnings =
    ignore:.*HTTP_422_UNPROCESSABLE_ENTITY.*:DeprecationWarning

[isort]
profile = black
