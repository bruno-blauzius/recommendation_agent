[flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    build,
    dist

[tool:pytest]
testpaths = tests
asyncio_mode = auto
addopts =
    --cov=infraestructure
    --cov=agent
    --cov=etl
    --cov=schemas
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=90

[isort]
profile = black
