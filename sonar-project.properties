sonar.projectKey=bruno-blauzius_recommendation_agent
sonar.organization=bruno-blauzius-1

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=recommendation_agent
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/.venv/**,**/venv/**,**/tests/**,**/migrations/**

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Python Version - match the version used in CI/CD (.github/workflows)
sonar.python.version=3.12

# Coverage
sonar.python.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=tests/**

# Disable PL/SQL analyzer (not used in this project)
sonar.plsql.file.suffixes=
