# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ================== BUILD IMAGE ==================
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ghcr.io/${{ github.repository }}:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================== TEST ==================
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-py${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest
        run: |
          pytest \
            --cov=infraestructure --cov=agent --cov=etl --cov=schemas \
            --cov-report=xml \
            --cov-report=html \
            --junitxml=junit.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: junit.xml

  # ================== TRIVY SECURITY SCAN ==================
  trivy-scan:
    name: Trivy Security Scan
    needs: build-image
    runs-on: ubuntu-latest
    environment: config-ci
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Trivy (latest)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          trivy --version

      - name: Run Trivy vulnerability scanner (Filesystem)
        run: |
          trivy fs \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-fs-results.sarif \
            .

      - name: Upload Trivy filesystem results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-filesystem'

      - name: Run Trivy vulnerability scanner (Docker Image)
        run: |
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-image-results.sarif \
            ${{ needs.build-image.outputs.image-tag }}

      - name: Upload Trivy image results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: 'trivy-image'

      - name: Upload security reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            trivy-fs-results.sarif
            trivy-image-results.sarif

  # ================== SBOM ==================
  sbom:
    name: Generate SBOM
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build-image.outputs.image-tag }}
          format: cyclonedx-json
          output-file: sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

  # ================== SMOKE TEST ==================
  smoke-test:
    name: Smoke Test
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cp .env.example .env

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull built image
        run: docker pull ${{ needs.build-image.outputs.image-tag }}

      - name: Start services with Docker Compose
        env:
          RECOMMENDATION_AGENT_IMAGE: ${{ needs.build-image.outputs.image-tag }}
        run: |
          docker compose up -d --no-build
          echo "Waiting for services to be healthy..."
          sleep 15

      - name: Check PostgreSQL connectivity
        run: |
          echo "Testing PostgreSQL connection..."
          docker compose exec -T postgres-vector-db pg_isready -U postgres -d recommendation_agent
          if [ $? -eq 0 ]; then
            echo "✓ PostgreSQL is accepting connections"
          else
            echo "✗ PostgreSQL healthcheck failed"
            exit 1
          fi

      - name: Check Redis connectivity
        run: |
          echo "Testing Redis connection..."
          docker compose exec -T redis redis-cli -a redis ping | grep -q PONG
          if [ $? -eq 0 ]; then
            echo "✓ Redis is responding"
          else
            echo "✗ Redis healthcheck failed"
            exit 1
          fi

      - name: Verify pgvector extension
        run: |
          echo "Verifying pgvector extension availability..."
          docker compose exec -T postgres-vector-db psql -U postgres -d recommendation_agent -c "SELECT * FROM pg_available_extensions WHERE name = 'vector';" | grep -q vector
          if [ $? -eq 0 ]; then
            echo "✓ pgvector extension is available"
          else
            echo "✗ pgvector extension not found"
            exit 1
          fi

      - name: Display service logs on failure
        if: failure()
        run: |
          echo "=== PostgreSQL logs ==="
          docker compose logs postgres-vector-db
          echo "=== Redis logs ==="
          docker compose logs redis

      - name: Shutdown services
        if: always()
        run: |
          docker compose down -v

  # ================== SONARQUBE ==================
  sonarqube:
    name: SonarQube Analysis
    needs: [build-image, test]
    runs-on: ubuntu-latest
    environment: config-ci
    # IMPORTANT: Disable automatic analysis in SonarCloud
    # Project Settings > Analysis method > Disable automatic/GitHub Actions analysis
    # This workflow uses sonar-scanner CLI which handles the analysis
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report (Python 3.10)
        uses: actions/download-artifact@v4
        with:
          name: coverage-py3.10
          path: coverage-reports

      - name: Debug - Check SONAR_TOKEN
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "ERROR: SONAR_TOKEN is not set"
            exit 1
          else
            echo "SONAR_TOKEN is set variable"
          fi

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=infraestructure,agent_core,etl,schemas
            -Dsonar.tests=tests
            -Dsonar.python.coverage.reportPaths=coverage-reports/coverage.xml
            -Dsonar.exclusions=coverage-reports/**
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ================== SEND DEPLOY ==================
  send-deploy:
    name: Send Deploy Notification
    needs: [test, trivy-scan, sbom, smoke-test, sonarqube]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Send deployment notification to Slack
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "Deployment successful for recommendation_agent! :tada:",
              "attachments": [
                {
                  "color": "#36a64f",
                  "fields": [
                    {
                      "title": "Repository",
                      "value": "${{ github.repository }}",
                      "short": true
                    },
                    {
                      "title": "Branch",
                      "value": "${{ github.ref }}",
                      "short": true
                    },
                    {
                      "title": "Commit",
                      "value": "${{ github.sha }}",
                      "short": false
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
