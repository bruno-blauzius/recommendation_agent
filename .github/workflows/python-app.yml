# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Initialize and Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest --cov=infraestructure --cov=agent --cov=etl --cov=schemas --cov-report=xml


  trivy-scan:
    name: Trivy Security Scan
    needs: build
    runs-on: ubuntu-latest
    environment: config-ci
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy v0.70.0
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.70.0
          trivy --version

      - name: Run Trivy vulnerability scanner (Filesystem)
        run: |
          trivy fs \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-fs-results.sarif \
            .

      - name: Upload Trivy filesystem results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'

      - name: Build Docker image
        run: |
          docker build -t recommendation_agent:${{ github.sha }} .
          docker tag recommendation_agent:${{ github.sha }} recommendation_agent:latest

      - name: Run Trivy vulnerability scanner (Docker Image)
        run: |
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-image-results.sarif \
            recommendation_agent:latest

      - name: Upload Trivy image results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-image-results.sarif'

  smoke-test:
    name: Smoke Test
    needs: trivy-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cp .env.example .env

      - name: Start services with Docker Compose
        run: |
          docker-compose up -d
          echo "Waiting for services to be healthy..."
          sleep 15

      - name: Check PostgreSQL connectivity
        run: |
          echo "Testing PostgreSQL connection..."
          docker-compose exec -T postgres-vector-db pg_isready -U postgres -d recommendation_agent
          if [ $? -eq 0 ]; then
            echo "✓ PostgreSQL is accepting connections"
          else
            echo "✗ PostgreSQL healthcheck failed"
            exit 1
          fi

      - name: Check Redis connectivity
        run: |
          echo "Testing Redis connection..."
          docker-compose exec -T redis redis-cli -a redis ping | grep -q PONG
          if [ $? -eq 0 ]; then
            echo "✓ Redis is responding"
          else
            echo "✗ Redis healthcheck failed"
            exit 1
          fi

      - name: Verify pgvector extension
        run: |
          echo "Verifying pgvector extension availability..."
          docker-compose exec -T postgres-vector-db psql -U postgres -d recommendation_agent -c "SELECT * FROM pg_available_extensions WHERE name = 'vector';" | grep -q vector
          if [ $? -eq 0 ]; then
            echo "✓ pgvector extension is available"
          else
            echo "✗ pgvector extension not found"
            exit 1
          fi

      - name: Display service logs on failure
        if: failure()
        run: |
          echo "=== PostgreSQL logs ==="
          docker-compose logs postgres-vector-db
          echo "=== Redis logs ==="
          docker-compose logs redis

      - name: Shutdown services
        if: always()
        run: |
          docker-compose down -v

  sonarqube:
    name: SonarQube Analysis
    needs: trivy-scan
    runs-on: ubuntu-latest
    environment: config-ci
    # IMPORTANT: Disable automatic analysis in SonarCloud
    # Project Settings > Analysis method > Disable automatic/GitHub Actions analysis
    # This workflow uses sonar-scanner CLI which handles the analysis
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Debug - Check SONAR_TOKEN
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "ERROR: SONAR_TOKEN is not set"
            exit 1
          else
            echo "SONAR_TOKEN is set variable"
          fi
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
