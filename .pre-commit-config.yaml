repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-added-large-files
  - id: check-merge-conflict

- repo: https://github.com/psf/black
  rev: 24.4.2
  hooks:
  - id: black
    language_version: python3

- repo: https://github.com/PyCQA/flake8
  rev: 7.1.0
  hooks:
  - id: flake8
    additional_dependencies: []

- repo: local
  hooks:
  - id: trivy-scan
    name: Trivy Security Scan (Filesystem)
    language: system
    entry: trivy fs --exit-code 1 --severity HIGH,CRITICAL --ignorefile .trivyignore .
    pass_filenames: false
    always_run: true

  - id: trivy-image
    name: Trivy Security Scan (Docker Image)
    language: system
    entry: bash -c 'docker build -t recommendation_agent:latest . && trivy image --exit-code 1 --severity HIGH,CRITICAL recommendation_agent:latest'
    pass_filenames: false
    always_run: true
    stages: [ manual ]

  - id: pytest-coverage
    name: Pytest with Coverage (>= 90%)
    language: system
    entry: pytest --tb=short
    pass_filenames: false
    always_run: true
